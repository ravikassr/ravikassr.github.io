<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amazon欲しいものリスト 図書館在庫チェッカー</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --panel: #ffffff;
      --ink: #20252b;
      --muted: #5e6875;
      --line: #dce2e8;
      --accent: #245f73;
      --accent-bg: #e5f1f4;
      --green: #157347;
      --green-bg: #e7f5ec;
      --orange: #ad6500;
      --orange-bg: #fff2dd;
      --red: #b42318;
      --red-bg: #fde8e6;
      --blue: #1f5f9f;
      --blue-bg: #e8f1fb;
      --gray: #667085;
      --gray-bg: #eef1f4;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
      line-height: 1.6;
    }

    header {
      background: #163f4d;
      color: #fff;
      padding: 24px 18px 18px;
    }

    .header-inner,
    main,
    footer {
      max-width: 1120px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 2.7vw, 2rem);
      letter-spacing: 0;
    }

    header p {
      max-width: 780px;
      margin: 6px 0 0;
      color: #d7e5e8;
      font-size: .9rem;
    }

    main { padding: 18px; }

    .workspace {
      display: grid;
      grid-template-columns: minmax(290px, 360px) 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel,
    .book-card,
    .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .panel { padding: 14px; }

    h2 {
      margin: 0 0 12px;
      font-size: 1rem;
    }

    .field { margin-bottom: 12px; }

    .field-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover { text-decoration: underline; }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    input {
      height: 38px;
      padding: 7px 10px;
    }

    textarea {
      min-height: 230px;
      resize: vertical;
      padding: 10px;
      font-size: .86rem;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      min-height: 38px;
      padding: 7px 12px;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.secondary {
      background: var(--accent-bg);
      border-color: #b7d4dc;
      color: var(--accent);
    }

    button:disabled {
      opacity: .55;
      cursor: default;
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: .76rem;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .search { flex: 1 1 230px; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filters button {
      min-height: 34px;
      padding: 5px 10px;
      color: var(--muted);
      font-size: .78rem;
    }

    .filters button.active {
      background: var(--accent-bg);
      border-color: #b7d4dc;
      color: var(--accent);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 10px;
    }

    .num {
      font-size: 1.45rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .stat-label {
      color: var(--muted);
      font-size: .72rem;
    }

    .ok .num { color: var(--green); }
    .lent .num { color: var(--orange); }
    .none .num { color: var(--gray); }
    .unknown .num { color: var(--blue); }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 24px;
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 10px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress {
      height: 6px;
      background: var(--gray-bg);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress > div {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width .25s;
    }

    .book-list {
      display: grid;
      gap: 10px;
    }

    .book-card { padding: 13px; }

    .book-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .book-title {
      margin: 0;
      font-size: .98rem;
      line-height: 1.45;
    }

    .meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: .76rem;
    }

    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: .75rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.ok { background: var(--green-bg); color: var(--green); }
    .badge.lent { background: var(--orange-bg); color: var(--orange); }
    .badge.none { background: var(--gray-bg); color: var(--gray); }
    .badge.wait,
    .badge.unknown { background: var(--blue-bg); color: var(--blue); }
    .badge.error { background: var(--red-bg); color: var(--red); }

    .libs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .lib {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 3px 8px;
      color: var(--muted);
      font-size: .74rem;
    }

    .lib.available {
      background: var(--green-bg);
      border-color: #b9dfc7;
      color: var(--green);
    }

    .lib.busy {
      background: var(--orange-bg);
      border-color: #ead0a7;
      color: var(--orange);
    }

    .lib.other {
      background: var(--gray-bg);
      color: var(--gray);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: .78rem;
      font-weight: 800;
    }

    .empty {
      padding: 28px 16px;
      color: var(--muted);
      text-align: center;
      font-size: .9rem;
    }

    footer {
      padding: 0 18px 28px;
      color: var(--muted);
      font-size: .76rem;
    }

    @media (max-width: 820px) {
      .workspace { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }

    @media (max-width: 520px) {
      header { padding-top: 20px; }
      main { padding: 12px; }
      .book-head {
        flex-direction: column;
        gap: 7px;
      }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Amazon欲しいものリスト 図書館在庫チェッカー</h1>
      <p>Amazonの本リンク、ISBN、ASINをもとに、指定した図書館システムの所蔵・貸出状況をまとめて確認できます。</p>
    </div>
  </header>

  <main>
    <div class="workspace">
      <section class="panel" aria-labelledby="settingsTitle">
        <h2 id="settingsTitle">確認する内容</h2>

        <div class="field">
          <label for="systemId">
            図書館システムID
            <a href="https://calil.jp/library/" target="_blank" rel="noopener">探す</a>
          </label>
          <input id="systemId" type="text" autocomplete="off" placeholder="例: Tokyo_Setagaya">
        </div>

        <div class="field">
          <label for="appkey">
            カーリルAPIキー
            <a href="https://calil.jp/api/dashboard/" target="_blank" rel="noopener">取得</a>
          </label>
          <input id="appkey" type="text" autocomplete="off" placeholder="任意">
        </div>

        <div class="field-grid">
          <div>
            <label for="wishlistUrl">Amazon欲しいものリストURL</label>
            <input id="wishlistUrl" type="url" autocomplete="off" placeholder="https://www.amazon.co.jp/hz/wishlist/ls/...">
          </div>
          <p class="hint">公開設定の欲しいものリストURLを入れると、リスト内の本リンクをまとめて取得します。</p>
        </div>

        <div class="field">
          <label for="sourceText">Amazonリンク / ISBN / ASIN</label>
          <textarea id="sourceText" spellcheck="false" placeholder="https://www.amazon.co.jp/dp/4061592998
9784003360512
吾輩は猫である 4003101014"></textarea>
          <p class="hint">ISBNが分かる本は在庫確認できます。KindleなどASINだけの行は、検索リンクとして表示します。</p>
        </div>

        <div class="actions">
          <button class="primary" id="checkBtn" type="button">在庫を確認</button>
          <button class="secondary" id="importBtn" type="button">リスト取得</button>
          <button id="clearBtn" type="button">クリア</button>
        </div>
      </section>

      <section aria-live="polite">
        <div class="topbar">
          <input class="search" id="q" type="search" placeholder="タイトル・ISBNで絞り込み">
          <div class="filters" role="group" aria-label="表示フィルター">
            <button class="active" data-filter="all" type="button">すべて</button>
            <button data-filter="ok" type="button">貸出可</button>
            <button data-filter="lent" type="button">所蔵あり</button>
            <button data-filter="none" type="button">所蔵なし</button>
            <button data-filter="unknown" type="button">ISBNなし</button>
          </div>
        </div>

        <div class="summary" id="summary"></div>
        <div class="status" id="status"></div>
        <div class="progress" aria-hidden="true"><div id="bar"></div></div>
        <div class="book-list" id="books"></div>
      </section>
    </div>
  </main>

  <footer>
    <p>在庫データは <a href="https://calil.jp/" target="_blank" rel="noopener">カーリル図書館API</a> を利用しています。入力内容はこのブラウザ内に保存され、在庫確認時にISBNと図書館システムIDだけをカーリルへ送信します。</p>
  </footer>

  <script>
    const STORAGE_KEY = "wishlist-library-checker-v3";
    const BATCH_SIZE = 40;
    const WISHLIST_PROXY_URL = "https://amazon-wishlist-proxy.aku0v0son.workers.dev";

    const state = {
      books: [],
      results: {},
      filter: "all",
      query: "",
      checking: false,
      checked: 0,
      total: 0
    };

    const els = {
      systemId: document.getElementById("systemId"),
      appkey: document.getElementById("appkey"),
      wishlistUrl: document.getElementById("wishlistUrl"),
      sourceText: document.getElementById("sourceText"),
      checkBtn: document.getElementById("checkBtn"),
      importBtn: document.getElementById("importBtn"),
      clearBtn: document.getElementById("clearBtn"),
      q: document.getElementById("q"),
      summary: document.getElementById("summary"),
      status: document.getElementById("status"),
      bar: document.getElementById("bar"),
      books: document.getElementById("books")
    };

    function esc(value) {
      return String(value).replace(/[&<>"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;"
      }[char]));
    }

    function normalizeIsbn(value) {
      return value.replace(/[^0-9Xx]/g, "").toUpperCase();
    }

    function isValidIsbn10(isbn) {
      if (!/^[0-9]{9}[0-9X]$/.test(isbn)) return false;
      let sum = 0;
      for (let i = 0; i < 9; i += 1) sum += Number(isbn[i]) * (10 - i);
      sum += isbn[9] === "X" ? 10 : Number(isbn[9]);
      return sum % 11 === 0;
    }

    function isValidIsbn13(isbn) {
      if (!/^(978|979)[0-9]{10}$/.test(isbn)) return false;
      let sum = 0;
      for (let i = 0; i < 12; i += 1) sum += Number(isbn[i]) * (i % 2 ? 3 : 1);
      return (10 - (sum % 10)) % 10 === Number(isbn[12]);
    }

    function isbn10to13(isbn10) {
      const core = "978" + isbn10.slice(0, 9);
      let sum = 0;
      for (let i = 0; i < 12; i += 1) sum += Number(core[i]) * (i % 2 ? 3 : 1);
      return core + ((10 - (sum % 10)) % 10);
    }

    function findAsin(line) {
      const urlMatch = line.match(/amazon\.[^/\s]+\/(?:[^/\s]+\/)?(?:dp|gp\/product|exec\/obidos\/ASIN)\/([A-Z0-9]{10})/i);
      if (urlMatch) return urlMatch[1].toUpperCase();
      const asinMatch = line.match(/\bB[0-9A-Z]{9}\b/i);
      return asinMatch ? asinMatch[0].toUpperCase() : "";
    }

    function cleanTitle(line, isbn, asin) {
      const title = line
        .replace(/https?:\/\/\S+/g, "")
        .replace(/(?:97[89][-\s]?)?[0-9][0-9Xx][0-9Xx-\s]{7,20}[0-9Xx]/g, "")
        .replace(isbn || "", "")
        .replace(asin || "", "")
        .replace(/[,\t]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      return title || (isbn ? `ISBN ${isbn}` : `ASIN ${asin}`);
    }

    function parseBooks(text) {
      const seen = new Set();
      return text.split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map((line, index) => {
          const candidates = line.match(/(?:97[89][-\s]?)?[0-9][0-9Xx][0-9Xx-\s]{7,20}[0-9Xx]/g) || [];
          let isbn = "";

          for (const candidate of candidates) {
            const normalized = normalizeIsbn(candidate);
            if (normalized.length === 13 && isValidIsbn13(normalized)) {
              isbn = normalized;
              break;
            }
            if (normalized.length === 10 && isValidIsbn10(normalized)) {
              isbn = isbn10to13(normalized);
              break;
            }
          }

          const asin = findAsin(line);
          if (!isbn && asin && isValidIsbn10(asin)) isbn = isbn10to13(asin);

          const key = isbn || asin || `line-${index}`;
          if (seen.has(key)) return null;
          seen.add(key);

          return {
            key,
            isbn,
            asin,
            title: cleanTitle(line, isbn, asin),
            original: line
          };
        })
        .filter(Boolean);
    }

    function normalizeAmazonUrl(url) {
      try {
        const parsed = new URL(url);
        if (!/amazon\./i.test(parsed.hostname)) return "";
        return parsed.href;
      } catch {
        return "";
      }
    }

    function buildProxyUrl(proxyUrl, targetUrl) {
      const encoded = encodeURIComponent(targetUrl);
      if (proxyUrl.includes("{url}")) return proxyUrl.replace("{url}", encoded);

      try {
        const parsed = new URL(proxyUrl);
        if (!parsed.searchParams.has("url")) parsed.searchParams.set("url", targetUrl);
        return parsed.href;
      } catch {
        return "";
      }
    }

    async function fetchWishlistHtml(wishlistUrl) {
      const url = normalizeAmazonUrl(wishlistUrl);
      if (!url) throw new Error("wishlist-url");
      if (!WISHLIST_PROXY_URL) throw new Error("proxy-url");

      const response = await fetch(buildProxyUrl(WISHLIST_PROXY_URL, url), {
        headers: { "Accept": "text/html,application/json" }
      });
      if (!response.ok) throw new Error("proxy-response");

      const body = await response.text();
      try {
        const data = JSON.parse(body);
        return data.html || data.body || data.content || body;
      } catch {
        return body;
      }
    }

    function bestTitleFromLink(link, asin) {
      const direct = link.getAttribute("title") || link.getAttribute("aria-label") || link.textContent;
      const card = link.closest("[data-itemid], li, .a-section");
      const cardTitle = card ? (
        card.querySelector("[id^='itemName_']")?.textContent ||
        card.querySelector(".a-link-normal[title]")?.getAttribute("title") ||
        card.querySelector("h2, h3")?.textContent
      ) : "";
      const title = (direct || cardTitle || "").replace(/\s+/g, " ").trim();
      return title && !title.includes(asin) ? title : `Amazon商品 ${asin}`;
    }

    function parseWishlistHtml(html) {
      const doc = new DOMParser().parseFromString(html, "text/html");
      const seen = new Set();
      const items = [];

      doc.querySelectorAll("a[href]").forEach(link => {
        const href = link.getAttribute("href") || "";
        const match = href.match(/\/(?:dp|gp\/product)\/([A-Z0-9]{10})(?:[/?#]|$)/i);
        if (!match) return;

        const asin = match[1].toUpperCase();
        if (seen.has(asin)) return;
        seen.add(asin);

        const title = bestTitleFromLink(link, asin);
        items.push({
          asin,
          title,
          line: `${title} https://www.amazon.co.jp/dp/${asin}`
        });
      });

      return items;
    }

    async function importWishlist() {
      if (state.checking) return;

      const wishlistUrl = els.wishlistUrl.value.trim();
      saveSettings();

      if (!wishlistUrl) {
        els.status.textContent = "Amazon欲しいものリストURLを入力してください。";
        els.wishlistUrl.focus();
        return;
      }

      els.importBtn.disabled = true;
      els.status.innerHTML = '<span class="spinner"></span>Amazon欲しいものリストを取得しています。';

      try {
        const html = await fetchWishlistHtml(wishlistUrl);
        const items = parseWishlistHtml(html);
        if (items.length === 0) {
          els.status.textContent = "本のリンクを取得できませんでした。リストの公開設定と、プロキシがHTMLを返しているか確認してください。";
          return;
        }

        const existing = els.sourceText.value.trim();
        const existingAsins = new Set(parseBooks(existing).map(book => book.asin).filter(Boolean));
        const lines = items
          .filter(item => !existingAsins.has(item.asin))
          .map(item => item.line);
        els.sourceText.value = [existing, ...lines].filter(Boolean).join("\n");
        state.books = parseBooks(els.sourceText.value);
        state.results = {};
        state.checked = 0;
        state.total = state.books.filter(book => book.isbn).length;
        saveSettings();
        render();
        els.status.textContent = `${items.length}件取得しました。続けて在庫を確認できます。`;
      } catch (error) {
        if (error.message === "wishlist-url") {
          els.status.textContent = "Amazon欲しいものリストURLの形式を確認してください。";
        } else if (error.message === "proxy-url") {
          els.status.textContent = "管理者側のリスト取得設定が未設定です。";
        } else {
          els.status.textContent = "リスト取得に失敗しました。プロキシ設定、公開リスト設定、Amazon側の応答を確認してください。";
        }
      } finally {
        els.importBtn.disabled = false;
      }
    }

    function verdictOf(book) {
      if (!book.isbn) return "unknown";
      const result = state.results[book.isbn];
      if (!result) return "wait";
      if (result.status === "Error") return "error";
      if (result.status === "Running") return "wait";
      const statuses = Object.values(result.libkey || {});
      if (statuses.length === 0) return "none";
      if (statuses.some(status => status.includes("貸出可"))) return "ok";
      return "lent";
    }

    function verdictLabel(verdict) {
      return {
        ok: "貸出可",
        lent: "所蔵あり",
        none: "所蔵なし",
        unknown: "ISBNなし",
        wait: "確認中",
        error: "エラー"
      }[verdict] || "未確認";
    }

    function libraryClass(status) {
      if (status.includes("貸出可")) return "available";
      if (status.includes("貸出中") || status.includes("予約")) return "busy";
      return "other";
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        systemId: els.systemId.value.trim(),
        appkey: els.appkey.value.trim(),
        wishlistUrl: els.wishlistUrl.value.trim(),
        sourceText: els.sourceText.value
      }));
    }

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        els.systemId.value = saved.systemId || "";
        els.appkey.value = saved.appkey || "";
        els.wishlistUrl.value = saved.wishlistUrl || "";
        els.sourceText.value = saved.sourceText || "";
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function renderSummary() {
      const counts = { ok: 0, lent: 0, none: 0, unknown: 0 };
      state.books.forEach(book => {
        const verdict = verdictOf(book);
        if (counts[verdict] !== undefined) counts[verdict] += 1;
      });

      els.summary.innerHTML = `
        <div class="stat ok"><div class="num">${counts.ok}</div><div class="stat-label">貸出可</div></div>
        <div class="stat lent"><div class="num">${counts.lent}</div><div class="stat-label">所蔵あり</div></div>
        <div class="stat none"><div class="num">${counts.none}</div><div class="stat-label">所蔵なし</div></div>
        <div class="stat unknown"><div class="num">${counts.unknown}</div><div class="stat-label">ISBNなし</div></div>
      `;
    }

    function renderBooks() {
      const query = state.query.toLowerCase();
      const rows = state.books
        .filter(book => {
          const verdict = verdictOf(book);
          if (state.filter !== "all" && verdict !== state.filter) return false;
          if (!query) return true;
          return `${book.title} ${book.isbn} ${book.asin}`.toLowerCase().includes(query);
        })
        .map(book => {
          const verdict = verdictOf(book);
          const result = book.isbn ? state.results[book.isbn] : null;
          const libs = result && result.libkey
            ? Object.entries(result.libkey).map(([name, status]) =>
                `<span class="lib ${libraryClass(status)}">${esc(name)} <strong>${esc(status)}</strong></span>`
              ).join("")
            : "";
          const reserveLink = result && result.reserveurl
            ? `<a href="${esc(result.reserveurl)}" target="_blank" rel="noopener">予約ページ</a>`
            : "";
          const amazonLink = book.asin
            ? `<a href="https://www.amazon.co.jp/dp/${esc(book.asin)}" target="_blank" rel="noopener">Amazon</a>`
            : "";
          const calilLink = book.isbn
            ? `<a href="https://calil.jp/book/${esc(book.isbn)}" target="_blank" rel="noopener">カーリル</a>`
            : `<a href="https://calil.jp/search?q=${encodeURIComponent(book.title)}" target="_blank" rel="noopener">カーリル検索</a>`;
          const note = !libs && verdict === "none"
            ? '<div class="meta">指定した図書館システムでは所蔵が見つかりませんでした。</div>'
            : !libs && verdict === "unknown"
              ? '<div class="meta">ISBNを取得できないため、自動の在庫確認は行いません。</div>'
              : !libs && verdict === "wait"
                ? '<div class="meta">在庫状況を確認しています。</div>'
                : !libs && verdict === "error"
                  ? '<div class="meta">在庫状況を取得できませんでした。</div>'
                  : "";

          return `<article class="book-card">
            <div class="book-head">
              <div>
                <h3 class="book-title">${esc(book.title)}</h3>
                <div class="meta">${book.isbn ? `ISBN: ${esc(book.isbn)}` : `ASIN: ${esc(book.asin || "-")}`}</div>
              </div>
              <span class="badge ${verdict}">${verdictLabel(verdict)}</span>
            </div>
            ${libs ? `<div class="libs">${libs}</div>` : note}
            <div class="links">${[reserveLink, amazonLink, calilLink].filter(Boolean).join("")}</div>
          </article>`;
        });

      els.books.innerHTML = rows.join("") || '<div class="empty">表示する本がありません。</div>';
    }

    function render() {
      renderSummary();
      renderBooks();
    }

    let jsonpCount = 0;
    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cb = "__calil_cb_" + (++jsonpCount);
        const script = document.createElement("script");
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("timeout"));
        }, 25000);

        function cleanup() {
          clearTimeout(timer);
          delete window[cb];
          script.remove();
        }

        window[cb] = data => {
          cleanup();
          resolve(data);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("network"));
        };
        script.src = url + "&callback=" + cb;
        document.head.appendChild(script);
      });
    }

    function applyData(data, systemId) {
      if (!data || !data.books) return;
      Object.entries(data.books).forEach(([isbn, systems]) => {
        if (systems && systems[systemId]) state.results[isbn] = systems[systemId];
      });
      state.checked = Object.values(state.results).filter(result => result.status !== "Running").length;
      els.bar.style.width = state.total ? `${Math.round((state.checked / state.total) * 100)}%` : "0%";
      render();
    }

    async function checkBatch(isbns, systemId, keyParam) {
      const isbnParam = encodeURIComponent(isbns.join(","));
      let data = await jsonp(`https://api.calil.jp/check?${keyParam}isbn=${isbnParam}&systemid=${encodeURIComponent(systemId)}&format=json`);
      applyData(data, systemId);

      let guard = 0;
      while (data && data.continue === 1 && guard < 25) {
        guard += 1;
        await new Promise(resolve => setTimeout(resolve, 2200));
        data = await jsonp(`https://api.calil.jp/check?${keyParam}session=${encodeURIComponent(data.session)}&format=json`);
        applyData(data, systemId);
      }
    }

    async function startCheck() {
      if (state.checking) return;

      const systemId = els.systemId.value.trim();
      if (!systemId) {
        els.status.textContent = "図書館システムIDを入力してください。";
        els.systemId.focus();
        return;
      }

      state.books = parseBooks(els.sourceText.value);
      state.results = {};
      state.checked = 0;
      state.total = state.books.filter(book => book.isbn).length;
      saveSettings();
      render();

      if (state.books.length === 0) {
        els.status.textContent = "確認する本を入力してください。";
        return;
      }

      if (state.total === 0) {
        els.status.textContent = "ISBNがある本が見つかりませんでした。";
        return;
      }

      const isbns = state.books.filter(book => book.isbn).map(book => book.isbn);
      const batches = [];
      for (let i = 0; i < isbns.length; i += BATCH_SIZE) batches.push(isbns.slice(i, i + BATCH_SIZE));

      state.checking = true;
      els.checkBtn.disabled = true;
      els.bar.style.width = "0%";
      const keyParam = els.appkey.value.trim()
        ? `appkey=${encodeURIComponent(els.appkey.value.trim())}&`
        : "";

      try {
        for (let i = 0; i < batches.length; i += 1) {
          els.status.innerHTML = `<span class="spinner"></span>確認中 ${i + 1}/${batches.length} グループ`;
          await checkBatch(batches[i], systemId, keyParam);
        }

        isbns.forEach(isbn => {
          if (!state.results[isbn] || state.results[isbn].status === "Running") {
            state.results[isbn] = { status: "Error" };
          }
        });
        state.checked = state.total;
        els.bar.style.width = "100%";
        els.status.textContent = "確認完了 " + new Date().toLocaleString("ja-JP");
        render();
      } catch {
        isbns.forEach(isbn => {
          if (!state.results[isbn] || state.results[isbn].status === "Running") {
            state.results[isbn] = { status: "Error" };
          }
        });
        els.status.textContent = "通信エラーが発生しました。時間をおいて再度確認してください。";
        render();
      } finally {
        state.checking = false;
        els.checkBtn.disabled = false;
      }
    }

    document.querySelectorAll(".filters button").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".filters button").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        state.filter = button.dataset.filter;
        render();
      });
    });

    els.q.addEventListener("input", event => {
      state.query = event.target.value.trim();
      render();
    });

    els.checkBtn.addEventListener("click", startCheck);
    els.importBtn.addEventListener("click", importWishlist);
    els.clearBtn.addEventListener("click", () => {
      if (state.checking) return;
      els.sourceText.value = "";
      state.books = [];
      state.results = {};
      state.checked = 0;
      state.total = 0;
      els.status.textContent = "";
      els.bar.style.width = "0%";
      saveSettings();
      render();
    });

    [els.systemId, els.appkey, els.wishlistUrl, els.sourceText].forEach(input => {
      input.addEventListener("change", saveSettings);
    });

    loadSettings();
    state.books = parseBooks(els.sourceText.value);
    state.total = state.books.filter(book => book.isbn).length;
    render();
  </script>
</body>
</html>
